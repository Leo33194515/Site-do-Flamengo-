<script>
const chatWidget  = document.getElementById('chatWidget');
const chatToggle  = document.getElementById('chatToggle');
const chatBody    = document.getElementById('chatBody');
const chatInput   = document.getElementById('chatInput');
const btnSend     = document.getElementById('btnSend');
const newsList    = document.getElementById('newsList');

let isMinimized = false;

/* =========================
   📰 NOTÍCIAS AUTOMÁTICAS
========================= */
const API_KEY = "3ca9e5d8a09040d0a4ea54f4efc6ed8d";

async function carregarNoticias() {
  try {
    const res = await fetch(`https://gnews.io/api/v4/search?q=flamengo&lang=pt&max=3&token=${API_KEY}`);
    const data = await res.json();

    if (!data.articles) throw "erro";

    newsList.innerHTML = data.articles.map(n => 
      `<div class="news-card">
        <h4>${n.title}</h4>
        <p>${n.description || ''}</p>
        <a href="${n.url}" target="_blank">Ler mais</a>
      </div>`
    ).join('');

  } catch (e) {
    newsList.innerHTML = '<div class="empty-news">Erro ao carregar notícias 😢</div>';
  }
}

/* =========================
   🤖 CHAT MELHORADO
========================= */

btnSend.addEventListener('click', sendMessage);
chatInput.addEventListener('keydown', e => {
  if(e.key === 'Enter') sendMessage();
});

function sendMessage(){
  const text = chatInput.value.trim();
  if(!text) return;

  addMessage('user', text);
  chatInput.value = '';

  setTimeout(()=>{
    addMessage('agent', responder(text));
  },600);
}

function addMessage(type, text){
  const div = document.createElement('div');
  div.className = `msg ${type}`;
  div.innerHTML = `<div>${text}</div>`;
  chatBody.appendChild(div);
  chatBody.scrollTop = chatBody.scrollHeight;
}

/* IA LOCAL MAIS INTELIGENTE */
function responder(msg){
  msg = msg.toLowerCase();

  if(msg.includes("oi") || msg.includes("ola"))
    return "Fala torcedor 🔴⚫🔥";

  if(msg.includes("noticia"))
    return "As últimas notícias já estão ali em cima 📰";

  if(msg.includes("titulo"))
    return "O Flamengo é um dos maiores campeões do Brasil 🔥🏆";

  if(msg.includes("jogo"))
    return "O Mengão sempre entra pra vencer 🔴⚫💪";

  if(msg.includes("gol"))
    return "GOOOOOOOL DO MENGÃO 🔥🔥🔥";

  if(msg.includes("time"))
    return "Elenco forte demais 🔴⚫";

  if(msg.includes("historia"))
    return "Flamengo tem uma história gigante no futebol mundial 🔥";

  if(msg.includes("tchau"))
    return "Valeu torcedor! 🔴⚫";

  const respostas = [
    "Pergunta sobre o Mengão 🔴⚫",
    "Não entendi, mas o Flamengo é gigante 🔥",
    "Manda outra pergunta aí 😎",
    "O Mengão nunca decepciona 🔴⚫🔥"
  ];

  return respostas[Math.floor(Math.random() * respostas.length)];
}

/* =========================
   🚀 INIT
========================= */
carregarNoticias();
</script>
