<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flamengo News</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #0e0e0e;
    color: #fff;
}

/* HEADER */
header {
    background: #111;
    border-bottom: 2px solid #c40000;
    padding: 15px 20px;
    font-size: 22px;
    font-weight: bold;
}

/* CONTAINER CENTRAL */
.wrapper {
    max-width: 1100px;
    margin: auto;
    padding: 20px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 25px;
}

/* CARD */
.card {
    background: #1a1a1a;
    border-radius: 12px;
    overflow: hidden;
    transition: 0.25s;
}

.card:hover {
    transform: translateY(-5px);
}

/* IMAGEM */
.card img {
    width: 100%;
    height: 170px;
    object-fit: cover;
}

/* TEXTO */
.content {
    padding: 15px;
}

.content h3 {
    margin: 0 0 10px;
    font-size: 18px;
    color: #ff3c3c;
}

.content p {
    font-size: 14px;
    color: #bbb;
    line-height: 1.4;
}

/* BOTÃO MASCOTE */
.floating {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #c40000;
    width: 70px;
    height: 70px;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    box-shadow: 0 5px 15px rgba(0,0,0,0.5);
}

.floating img {
    width: 50px;
}
</style>

</head>
<body>

<header>Flamengo News</header>

<div class="wrapper">
    <div class="grid">

        <div class="card">
            <img src="https://picsum.photos/500/300?1">
            <div class="content">
                <h3>Vitória no clássico</h3>
                <p>O Flamengo vence com autoridade e mantém boa fase na temporada.</p>
            </div>
        </div>

        <div class="card">
            <img src="https://picsum.photos/500/300?2">
            <div class="content">
                <h3>Destaque da rodada</h3>
                <p>Atacante decide jogo e vira referência ofensiva do time.</p>
            </div>
        </div>

        <div class="card">
            <img src="https://picsum.photos/500/300?3">
            <div class="content">
                <h3>Mudanças táticas</h3>
                <p>Treinador ajusta esquema e equipe apresenta evolução.</p>
            </div>
        </div>

    </div>
</div>

<div class="floating">
    <img src="imagem.png">
</div>

</body>
</html>
