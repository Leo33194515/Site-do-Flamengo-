
<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flamengo Oficial</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(180deg, #8b0000, #1a0000);
    color: white;
}

/* TOPO */
header {
    background: #cc0000;
    padding: 15px;
    text-align: center;
    font-size: 22px;
    font-weight: bold;
}

/* HERO */
.hero {
    text-align: center;
    padding: 80px 20px;
}

/* BOTÃO COM MASCOTE */
.chat-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: radial-gradient(circle, #ff1a1a, #990000);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 0 25px rgba(255,0,0,0.8);
}

/* MASCOTE ANIMADO */
.mascote {
    font-size: 40px;
    animation: flutuar 2s infinite ease-in-out;
}

/* animação de flutuar */
@keyframes flutuar {
    0% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
    100% { transform: translateY(0); }
}

/* quando abre chat */
.chat-btn.ativo .mascote {
    animation: pular 0.4s ease;
}

@keyframes pular {
    0% { transform: scale(1); }
    50% { transform: scale(1.3); }
    100% { transform: scale(1); }
}

/* CHAT */
.chat-box {
    position: fixed;
    bottom: 120px;
    right: 20px;
    width: 280px;
    background: #111;
    border-radius: 10px;
    display: none;
    flex-direction: column;
}

.chat-header {
    background: #cc0000;
    padding: 10px;
    text-align: center;
}

.chat-messages {
    padding: 10px;
    height: 200px;
    overflow-y: auto;
}

.chat-input {
    display: flex;
}

.chat-input input {
    flex: 1;
    padding: 8px;
    border: none;
}

.chat-input button {
    background: red;
    border: none;
    color: white;
    padding: 8px;
}
</style>
</head>

<body>

<header>🔴 Flamengo Oficial</header>

<section class="hero">
    <h1>Bem-vindo ao Mengão 🔥</h1>
</section>

<!-- CHAT -->
<div class="chat-box" id="chatBox">
    <div class="chat-header">Mascote</div>
    <div class="chat-messages" id="chatMessages">
        <p>🔥 Fala, torcedor!</p>
    </div>
    <div class="chat-input">
        <input id="msg" placeholder="Digite...">
        <button onclick="enviar()">➤</button>
    </div>
</div>

<!-- BOTÃO -->
<div class="chat-btn" id="btn" onclick="toggleChat()">
    <div class="mascote">🐦‍🔥</div>
</div>

<script>
function toggleChat() {
    let chat = document.getElementById("chatBox");
    let btn = document.getElementById("btn");

    if (chat.style.display === "flex") {
        chat.style.display = "none";
        btn.classList.remove("ativo");
    } else {
        chat.style.display = "flex";
        btn.classList.add("ativo");
    }
}

function enviar() {
    let input = document.getElementById("msg");
    let chat = document.getElementById("chatMessages");

    if(input.value === "") return;

    chat.innerHTML += "<p>Você: " + input.value + "</p>";

    setTimeout(() => {
        chat.innerHTML += "<p>Mascote: 🔥 Aqui é Flamengo!</p>";
        chat.scrollTop = chat.scrollHeight;
    }, 500);

    input.value = "";
}
</script>

</body>
</html>
