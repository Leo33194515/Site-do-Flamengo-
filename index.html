<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flamengo News</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    🔴 Flamengo News
</header>

<section class="hero">
    <img src="mascote.png" class="mascote">
    <h2>Últimas notícias do Mengão</h2>
</section>

<section class="news" id="news"></section>

<!-- BOTÃO FLUTUANTE -->
<div class="chat-button" onclick="toggleChat()">
    <img src="mascote.png">
</div>

<!-- CHAT -->
<div class="chat" id="chat">
    <div class="chat-header">Chat Rubro-Negro</div>
    <div class="chat-body" id="chatBody"></div>
    <div class="chat-input">
        <input type="text" id="inputMsg" placeholder="Digite...">
        <button onclick="sendMessage()">➤</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
