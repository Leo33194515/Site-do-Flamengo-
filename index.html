<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notícias do Flamengo</title>

<style>
body{
  background:#111;
  color:#fff;
  font-family:Arial;
  text-align:center;
}

h1{
  color:red;
}

#news{
  margin-top:20px;
}

.card{
  background:#222;
  margin:10px;
  padding:15px;
  border-radius:10px;
}

a{
  color:#ff4444;
  text-decoration:none;
}
</style>
</head>

<body>

<h1>📰 Notícias do Flamengo</h1>
<p id="status">Carregando...</p>

<div id="news"></div>

<script>
async function carregarNoticias(){
  try{
    const url = "https://api.allorigins.win/raw?url=https://globoesporte.globo.com/rss/futebol/times/flamengo/";

    const res = await fetch(url);
    const text = await res.text();

    const parser = new DOMParser();
    const xml = parser.parseFromString(text, "text/xml");

    const items = xml.querySelectorAll("item");
    const newsDiv = document.getElementById("news");

    document.getElementById("status").innerText = "";

    items.forEach((item, i) => {
      if(i < 3){
        const title = item.querySelector("title").textContent;
        const link = item.querySelector("link").textContent;

        newsDiv.innerHTML += `
          <div class="card">
            <h3>${title}</h3>
            <a href="${link}" target="_blank">Ler mais</a>
          </div>
        `;
      }
    });

  }catch(e){
    document.getElementById("status").innerText = "Erro ao carregar notícias 😡";
  }
}

carregarNoticias();
</script>

</body>
</html>
