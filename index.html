<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flamengo Notícias</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(180deg, #8b0000, #1a0000);
    color: white;
}

/* TOPO */
header {
    background: black;
    padding: 15px;
    text-align: center;
    font-size: 24px;
    font-weight: bold;
}

/* MASCOTE NO TOPO */
.mascote {
    position: fixed;
    top: 10px;
    left: 10px;
    width: 60px;
}

/* NOTÍCIAS */
.container {
    padding: 20px;
}

.noticia {
    background: rgba(0,0,0,0.6);
    padding: 15px;
    margin-bottom: 15px;
    border-left: 5px solid red;
    border-radius: 10px;
}

/* BOTÃO FLUTUANTE */
.botao {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: red;
    border-radius: 50%;
    width: 70px;
    height: 70px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 0 10px black;
}

/* IMAGEM DO BOTÃO */
.botao img {
    width: 50px;
}

/* CAIXA DO CHAT */
.chat {
    position: fixed;
    bottom: 100px;
    right: 20px;
    width: 250px;
    background: black;
    padding: 10px;
    border-radius: 10px;
    display: none;
}
</style>

</head>

<body>

<header>🔴 Flamengo Notícias ⚫</header>

<!-- MASCOTE (troca imagem.png pela sua imagem) -->
<img src="imagem.png" class="mascote">

<div class="container">

    <h2>Últimas Notícias</h2>

    <div class="noticia">
        <h3>Flamengo vence o clássico</h3>
        <p>Vitória por 2x1 com destaque para Pedro.</p>
    </div>

    <div class="noticia">
        <h3>Novo reforço chega</h3>
        <p>Clube anuncia contratação para temporada 2026.</p>
    </div>

    <div class="noticia">
        <h3>Torcida faz festa</h3>
        <p>Maracanã lotado em mais um jogo histórico.</p>
    </div>

</div>

<!-- CHAT -->
<div class="chat" id="chatBox">
    <p>Fala Nação! 🔴⚫</p>
    <p>Quer saber mais notícias?</p>
</div>

<!-- BOTÃO COM MASCOTE -->
<div class="botao" onclick="abrirChat()">
    <img src="imagem.png">
</div>

<script>
function abrirChat() {
    var chat = document.getElementById("chatBox");
    if (chat.style.display === "none") {
        chat.style.display = "block";
    } else {
        chat.style.display = "none";
    }
}
</script>

</body>
</html>
