<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flamengo Notícias</title>

<style>
body{
  background:#111;
  color:#fff;
  font-family:Arial;
  margin:0;
  padding:20px;
}

h2{
  color:#ff0000;
}

/* NOTÍCIAS */
.news-card{
  background:#1c1c1c;
  padding:10px;
  margin-bottom:10px;
  border-radius:8px;
}

.news-card a{
  color:#ff4444;
}

/* CHAT */
#chatWidget{
  position:fixed;
  bottom:10px;
  right:10px;
  width:250px;
  background:#000;
  border-radius:10px;
  overflow:hidden;
}

#chatBody{
  height:200px;
  overflow:auto;
  padding:10px;
}

.msg{
  margin:5px 0;
}

.msg.user{
  text-align:right;
}

.msg.agent{
  text-align:left;
}

#chatInput{
  width:70%;
}

</style>
</head>

<body>

<h2>📰 Notícias do Flamengo</h2>
<div id="newsList">Carregando...</div>

<!-- CHAT -->
<div id="chatWidget">
  <div id="chatBody"></div>
  <input id="chatInput" placeholder="Pergunta..." />
  <button id="btnSend">Enviar</button>
</div>

<script>
const chatBody    = document.getElementById('chatBody');
const chatInput   = document.getElementById('chatInput');
const btnSend     = document.getElementById('btnSend');
const newsList    = document.getElementById('newsList');

/* API */
const API_KEY = "3ca9e5d8a09040d0a4ea54f4efc6ed8d";

async function carregarNoticias() {
  try {
    const res = await fetch(`https://gnews.io/api/v4/search?q=flamengo&lang=pt&max=3&token=${API_KEY}`);
    const data = await res.json();

    newsList.innerHTML = data.articles.map(n => `
      <div class="news-card">
        <h4>${n.title}</h4>
        <p>${n.description || ''}</p>
        <a href="${n.url}" target="_blank">Ler mais</a>
      </div>
    `).join('');

  } catch {
    newsList.innerHTML = "Erro ao carregar notícias";
  }
}

/* CHAT */
btnSend.onclick = () => {
  const text = chatInput.value.trim();
  if(!text) return;

  addMessage('user', text);
  chatInput.value = '';

  setTimeout(()=>{
    addMessage('agent', responder(text));
  },500);
};

function addMessage(type, text){
  const div = document.createElement('div');
  div.className = `msg ${type}`;
  div.innerText = text;
  chatBody.appendChild(div);
  chatBody.scrollTop = chatBody.scrollHeight;
}

function responder(msg){
  msg = msg.toLowerCase();

  if(msg.includes("oi")) return "Fala torcedor 🔴⚫";
  if(msg.includes("gol")) return "GOOOOOOL 🔥";
  if(msg.includes("flamengo")) return "Maior do Brasil 🔴⚫";

  return "Pergunta outra aí 😎";
}

/* INIT */
carregarNoticias();
</script>

</body>
</html>
