<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Site Flamengo 🔴⚫</title>

<style>
/* === RESET & BASE === */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: Arial, sans-serif;
  background:#111;
  color:#fff;
}

/* HEADER */
.header {
  background:#c8102e;
  padding:15px;
  text-align:center;
  box-shadow: 0 4px 10px rgba(0,0,0,0.5);
}

/* HERO */
.hero {
  text-align:center;
  padding:50px 20px;
  background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)), #000;
  background-size: cover;
  position: relative;
}
.hero img.logo {
  width: 180px;
  margin-bottom: 15px;
}
.hero img.mascote {
  width: 220px;
  margin: 20px 0;
  filter: drop-shadow(0 10px 15px rgba(200, 16, 46, 0.6));
}

/* NEWS */
.news-section {
  padding:30px 20px;
  max-width: 900px;
  margin: 0 auto;
}
.news-card {
  background:#222;
  padding:18px;
  margin-bottom:15px;
  border-left:5px solid #c8102e;
  border-radius: 8px;
  transition: all 0.3s;
}
.news-card:hover {
  transform: translateX(10px);
  box-shadow: 0 5px 15px rgba(200,16,46,0.3);
}

/* BOTÕES FLUTUANTES */
.btn-fixo {
  position:fixed;
  bottom:20px;
  width:65px;
  height:65px;
  border-radius:50%;
  border:none;
  font-size:28px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.7);
  cursor: pointer;
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  text-decoration: none;
}

#chatToggle {
  background:#c8102e;
  color:white;
  right: 100px;
}

#ingressoBtn {
  background:#009c3b;
  color:white;
  right: 20px;
  font-size: 24px;
}

/* CHAT */
.chat-widget {
  position:fixed;
  bottom:90px;
  right:20px;
  width:320px;
  height:460px;
  background:#1a1a1a;
  border-radius:12px;
  display:none;
  flex-direction:column;
  box-shadow: 0 10px 30px rgba(0,0,0,0.8);
  overflow: hidden;
  z-index: 1001;
}

.chat-header {
  background:#c8102e;
  padding:12px;
  text-align:center;
  font-weight:bold;
}

.chat-body {
  flex:1;
  overflow:auto;
  padding:15px;
  background:#111;
}

.msg {
  margin:8px 0;
  padding:10px 14px;
  border-radius:18px;
  max-width:85%;
  line-height:1.4;
  white-space: pre-line;
}
.msg.user {
  background:#c8102e;
  margin-left: auto;
  border-bottom-right-radius: 4px;
}
.msg.bot {
  background:#333;
  margin-right: auto;
  border-bottom-left-radius: 4px;
}

.chat-input {
  display:flex;
  padding:10px;
  background:#222;
  gap:8px;
}
.chat-input input {
  flex:1;
  padding:12px;
  border:none;
  border-radius:25px;
  background:#333;
  color:white;
}
.chat-input button {
  background:#c8102e;
  color:white;
  border:none;
  padding:0 18px;
  border-radius:25px;
  cursor:pointer;
}
</style>
</head>

<body>

<header class="header">
  <h1>🔴⚫ Flamengo</h1>
</header>

<section class="hero">
  <img src="mascote.png" alt="Mascote Flamengo" class="mascote">
  <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/f/f1/CR_Flamengo_logo.svg/512px-CR_Flamengo_logo.svg.png" alt="Logo Flamengo" class="logo">
  <h2>Bem-vindo ao Mengão!</h2>
  <p>O Maior do Brasil 🔥</p>
</section>

<section class="news-section">
  <h3>Últimas Notícias do Flamengo</h3>
  <div id="newsList"></div>
</section>

<!-- Botão Comprar Ingresso -->
<a href="https://www.flamengo.com.br/ingressos" target="_blank" id="ingressoBtn" class="btn-fixo" title="Comprar Ingresso">
  🎟️
</a>

<!-- Botão Chat -->
<button class="btn-fixo" id="chatToggle">💬</button>

<!-- Chat Widget -->
<div class="chat-widget" id="chatWidget">
  <div class="chat-header">🦅 Chat do Flamengo</div>
  <div class="chat-body" id="chatBody"></div>
  <div class="chat-input">
    <input id="chatInput" placeholder="Pergunte sobre o Flamengo..." autocomplete="off">
    <button id="btnSend">Enviar</button>
  </div>
</div>

<script>
// ==================== NOTÍCIAS ATUALIZADAS (17/04/2026) ====================
const noticias = [
  {
    titulo: "Flamengo goleia Independiente Medellín por 4 a 1 e segue 100% na Libertadores",
    texto: "Em grande atuação no Maracanã, o Mengão atropelou o time colombiano com gols de Paquetá, Bruno Henrique, Arrascaeta e Pedro. Leonardo Jardim elogiou a intensidade e o time mantém liderança do Grupo A!",
    data: "Há poucas horas"
  },
  {
    titulo: "Leonardo Jardim valoriza Bruno Henrique e Arrascaeta após goleada na Libertadores",
    texto: "Técnico destacou o peso histórico dos dois ídolos e explicou a escalação com 'força máxima'. Flamengo embala com bom futebol e já pensa no próximo compromisso.",
    data: "Há 1 dia"
  },
  {
    titulo: "Flamengo vence Fluminense por 2 a 1 no Brasileirão com gols de Pedro",
    texto: "Em clássico disputado no Maracanã, o Mengão superou o Flu com grande atuação do artilheiro Pedro. Vitória importante na tabela do Campeonato Brasileiro.",
    data: "Há 5 dias"
  }
];

// Renderiza as notícias
const newsList = document.getElementById('newsList');
newsList.innerHTML = '';
noticias.forEach(noticia => {
  const card = document.createElement("div");
  card.className = "news-card";
  card.innerHTML = `
    <small style="color:#c8102e">${noticia.data}</small>
    <h4>${noticia.titulo}</h4>
    <p>${noticia.texto}</p>
  `;
  newsList.appendChild(card);
});

// ==================== CHAT INTELIGENTE ====================
const chatToggle = document.getElementById('chatToggle');
const chatWidget = document.getElementById('chatWidget');
const chatBody = document.getElementById('chatBody');
const chatInput = document.getElementById('chatInput');
const btnSend = document.getElementById('btnSend');

chatToggle.addEventListener('click', () => {
  chatWidget.style.display = chatWidget.style.display === 'flex' ? 'none' : 'flex';
});

btnSend.addEventListener('click', sendMessage);
chatInput.addEventListener('keypress', (e) => {
  if (e.key === 'Enter') sendMessage();
});

function sendMessage() {
  const text = chatInput.value.trim();
  if (!text) return;

  addMessage(text, 'user');
  chatInput.value = '';

  // Resposta simples do bot (pode melhorar depois)
  setTimeout(() => {
    let resposta = 'Salve, nação! 🔴⚫ Ainda estou aprendendo, mas me fala mais sobre o que quer saber do Mengão?';
    
    if (text.toLowerCase().includes('jogo') || text.toLowerCase().includes('próximo')) {
      resposta = 'Próximos jogos:\n19/04 - Flamengo x Bahia (Brasileirão) 19h30\n22/04 - Flamengo x Vitória (Copa do Brasil)\nFica ligado!';
    } else if (text.toLowerCase().includes('notícia') || text.toLowerCase().includes('última')) {
      resposta = 'A última: Flamengo goleou o Medellín por 4x1 na Libertadores! Tá voando o Mengão!';
    }
    
    addMessage(resposta, 'bot');
  }, 600);
}

function addMessage(msg, type) {
  const div = document.createElement('div');
  div.className = `msg ${type}`;
  div.textContent = msg;
  chatBody.appendChild(div);
  chatBody.scrollTop = chatBody.scrollHeight;
}

// Mensagem inicial do bot
setTimeout(() => {
  addMessage('Salve, nação rubro-negra! 🔴⚫ Tudo certo? Pergunta aí sobre jogos, ídolos, notícias ou qualquer coisa do Mengão!', 'bot');
}, 800);
</script>

</body>
</html>
