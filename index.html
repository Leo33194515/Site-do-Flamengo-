<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notícias do Flamengo</title>

<style>
body{
  background:#111;
  color:#fff;
  font-family:Arial;
  margin:0;
  padding:20px;
}

h1{
  color:red;
}

#newsList{
  margin-top:20px;
}

.news-item{
  margin-bottom:15px;
  padding:10px;
  border-bottom:1px solid #333;
}

.news-item a{
  color:#ff0000;
  text-decoration:none;
  font-size:16px;
}

.chat-box{
  margin-top:30px;
  border:1px solid #333;
  border-radius:10px;
  padding:10px;
}

input{
  width:70%;
  padding:10px;
  border:none;
}

button{
  padding:10px;
  background:red;
  color:#fff;
  border:none;
}
</style>
</head>

<body>

<h1>📰 Notícias do Flamengo</h1>

<div id="newsList">Carregando...</div>

<div class="chat-box">
  <input type="text" placeholder="Pergunta...">
  <button>Enviar</button>
</div>

<script>
const newsList = document.getElementById("newsList");

async function carregarNoticias() {
  try {
    const url = "https://api.allorigins.win/get?url=" + encodeURIComponent(
      "https://news.google.com/rss/search?q=Flamengo&hl=pt-BR&gl=BR&ceid=BR:pt-419"
    );

    const res = await fetch(url);
    const data = await res.json();

    const parser = new DOMParser();
    const xml = parser.parseFromString(data.contents, "text/xml");

    const items = xml.querySelectorAll("item");

    newsList.innerHTML = "";

    items.forEach((item, i) => {
      if (i >= 3) return;

      const titulo = item.querySelector("title").textContent;
      const link = item.querySelector("link").textContent;

      const div = document.createElement("div");
      div.className = "news-item";
      div.innerHTML = `
        <a href="${link}" target="_blank">${titulo}</a>
      `;

      newsList.appendChild(div);
    });

  } catch (erro) {
    newsList.innerHTML = "Erro ao carregar notícias 😢";
    console.error(erro);
  }
}

carregarNoticias();
</script>

</body>
</html>
