<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Site Flamengo 🔴⚫</title>

<style>
/* === RESET & BASE === */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: Arial, sans-serif;
  background:#111;
  color:#fff;
}

/* HEADER */
.header {
  background:#c8102e;
  padding:15px;
  text-align:center;
  box-shadow: 0 4px 10px rgba(0,0,0,0.5);
}

/* HERO */
.hero {
  text-align:center;
  padding:50px 20px;
  background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)), #000;
  background-size: cover;
  position: relative;
}
.hero img.logo {
  width: 180px;
  margin-bottom: 15px;
}
.hero img.mascote {
  width: 220px;
  margin: 20px 0;
  filter: drop-shadow(0 10px 15px rgba(200, 16, 46, 0.6));
}

/* NEWS */
.news-section {
  padding:30px 20px;
  max-width: 900px;
  margin: 0 auto;
}
.news-card {
  background:#222;
  padding:18px;
  margin-bottom:15px;
  border-left:5px solid #c8102e;
  border-radius: 8px;
  transition: all 0.3s;
}
.news-card:hover {
  transform: translateX(10px);
  box-shadow: 0 5px 15px rgba(200,16,46,0.3);
}

/* BOTÕES FLUTUANTES */
.btn-fixo {
  position:fixed;
  bottom:20px;
  width:65px;
  height:65px;
  border-radius:50%;
  border:none;
  font-size:28px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.7);
  cursor: pointer;
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  text-decoration: none;
}

#chatToggle {
  background:#c8102e;
  color:white;
  right: 100px;
}

#ingressoBtn {
  background:#009c3b;
  color:white;
  right: 20px;
  font-size: 24px;
}

/* CHAT */
.chat-widget {
  position:fixed;
  bottom:90px;
  right:20px;
  width:320px;
  height:460px;
  background:#1a1a1a;
  border-radius:12px;
  display:none;
  flex-direction:column;
  box-shadow: 0 10px 30px rgba(0,0,0,0.8);
  overflow: hidden;
  z-index: 1001;
}

.chat-header {
  background:#c8102e;
  padding:12px;
  text-align:center;
  font-weight:bold;
}

.chat-body {
  flex:1;
  overflow:auto;
  padding:15px;
  background:#111;
}

.msg {
  margin:8px 0;
  padding:10px 14px;
  border-radius:18px;
  max-width:85%;
  line-height:1.4;
}
.msg.user {
  background:#c8102e;
  margin-left: auto;
  border-bottom-right-radius: 4px;
}
.msg.bot {
  background:#333;
  margin-right: auto;
  border-bottom-left-radius: 4px;
}

.chat-input {
  display:flex;
  padding:10px;
  background:#222;
  gap:8px;
}
.chat-input input {
  flex:1;
  padding:12px;
  border:none;
  border-radius:25px;
  background:#333;
  color:white;
}
.chat-input button {
  background:#c8102e;
  color:white;
  border:none;
  padding:0 18px;
  border-radius:25px;
  cursor:pointer;
}
</style>
</head>

<body>

<header class="header">
  <h1>🔴⚫ Flamengo</h1>
</header>

<section class="hero">
  <img src="mascote.png" alt="Mascote Flamengo" class="mascote">
  <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/f/f1/CR_Flamengo_logo.svg/512px-CR_Flamengo_logo.svg.png" alt="Logo Flamengo" class="logo">
  <h2>Bem-vindo ao Mengão!</h2>
  <p>O Maior do Brasil 🔥</p>
</section>

<section class="news-section">
  <h3>Últimas Notícias do Flamengo</h3>
  <div id="newsList"></div>
</section>

<!-- Botão Comprar Ingresso -->
<a href="https://www.flamengo.com.br/ingressos" target="_blank" id="ingressoBtn" class="btn-fixo" title="Comprar Ingresso">
  🎟️
</a>

<!-- Botão Chat -->
<button class="btn-fixo" id="chatToggle">💬</button>

<!-- Chat Widget -->
<div class="chat-widget" id="chatWidget">
  <div class="chat-header">🦅 Chat do Flamengo</div>
  <div class="chat-body" id="chatBody"></div>
  <div class="chat-input">
    <input id="chatInput" placeholder="Pergunte sobre o Flamengo..." autocomplete="off">
    <button id="btnSend">Enviar</button>
  </div>
</div>

<script>
// ==================== NOTÍCIAS ====================
const noticias = [
  {
    titulo: "Flamengo vence o Fluminense e assume a liderança do Carioca",
    texto: "Em clássico disputado no Maracanã, o Mengão venceu por 2x1 com gols de Pedro e Arrascaeta.",
    data: "Há 2 horas"
  },
  {
    titulo: "Tite elogia garotos da base: 'São o futuro do clube'",
    texto: "Após vitória, o técnico Tite destacou o desempenho de jovens como Lorran e Matheus Gonçalves.",
    data: "Há 5 horas"
  },
  {
    titulo: "Flamengo anuncia renovação de contrato com Giorgian de Arrascaeta",
    texto: "O uruguaio, ídolo da torcida, assinou até dezembro de 2028.",
    data: "Ontem"
  }
];

const newsList = document.getElementById('newsList');

noticias.forEach(noticia => {
  const card = document.createElement("div");
  card.className = "news-card";
  card.innerHTML = `
    <small style="color:#c8102e">${noticia.data}</small>
    <h4>${noticia.titulo}</h4>
    <p>${noticia.texto}</p>
  `;
  newsList.appendChild(card);
});

// ==================== CHAT INTELIGENTE ====================
const chatToggle = document.getElementById('chatToggle');
const chatWidget = document.getElementById('chatWidget');
const chatBody = document.getElementById('chatBody');
const chatInput = document.getElementById('chatInput');
const btnSend = document.getElementById('btnSend');

chatToggle.onclick = () => {
  chatWidget.style.display = (chatWidget.style.display === 'flex') ? 'none' : 'flex';
  if (chatWidget.style.display === 'flex') chatInput.focus();
}

function getBotResponse(texto) {
  const msg = texto.toLowerCase();

  if (msg.includes("oi") || msg.includes("olá") || msg.includes("boa")) 
    return "Olá, nação rubro-negra! Tudo bem? Como posso ajudar hoje? 🔥";

  if (msg.includes("noticia") || msg.includes("notícia"))
    return "Temos várias notícias quentes! Quer que eu te conte as últimas do Mengão?";

  if (msg.includes("melhor") || msg.includes("maior"))
    return "O Flamengo é o maior clube do Brasil e da América! Nação gigante! 🔴⚫";

  if (msg.includes("ingresso") || msg.includes("comprar"))
    return "Para comprar ingressos, clique no botão verde 🎟️ que está na tela!";

  if (msg.includes("pedro") || msg.includes("arrascaeta"))
    return "Pedro e Arrascaeta são monstros sagrados do Mengão!";

  return "Flamengo é gigante, irmão! 🔴⚫ O que mais você quer saber sobre o nosso time?";
}

function addMsg(text, isUser = false) {
  const div = document.createElement("div");
  div.className = `msg ${isUser ? 'user' : 'bot'}`;
  div.innerText = text;
  chatBody.appendChild(div);
  chatBody.scrollTop = chatBody.scrollHeight;
}

function sendMessage() {
  const text = chatInput.value.trim();
  if (!text) return;

  addMsg(text, true);

  setTimeout(() => {
    const resposta = getBotResponse(text);
    addMsg(resposta);
  }, 600);

  chatInput.value = "";
}

btnSend.onclick = sendMessage;
chatInput.addEventListener("keypress", (e) => {
  if (e.key === "Enter") sendMessage();
});

// Mensagem inicial do chat
window.onload = () => {
  setTimeout(() => {
    addMsg("Bem-vindo ao Chat do Flamengo! 💬\nPode perguntar qualquer coisa sobre o Mengão!");
  }, 800);
}
</script>

</body>
</html>
